<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search App</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>🎬 Movie Search App</h1>
        <p>Search your favorite movies instantly</p>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <input
            type="text"
            id="movieInput"
            placeholder="Enter movie name..."
        >

        <button id="searchBtn">
            Search
        </button>
    </section>

    <!-- Loading State -->
    <div id="loading" class="hidden">
        <p>Loading movie details...</p>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden">
    <p>❌ Movie not found. Please try another title.</p>
</div>

    <!-- Welcome Message -->
    <div id="welcome">
        <h2>Welcome to Movie Search App</h2>
        <p>Search for any movie to view its details.</p>
    </div>

    <!-- Movie Result Container -->
    <main id="movieContainer">

    </main>

    <!-- Footer -->
    <footer>
        <p>Powered by OMDb API</p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
