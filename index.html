<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search App</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-btn">
        🌙
    </button>

    <!-- Hero Section -->
    <header class="hero">
        <h1>🍿 MovieVerse</h1>
<p>Your gateway to the world of movies</p>
    </header>

    <!-- Search Section -->
    <section class="search-section">

        <input
            type="text"
            id="movieInput"
            placeholder="Search for a movie..."
        >

        <button id="searchBtn">
            Search
        </button>

    </section>

    <!-- Recent Searches -->
    <section id="recentSearches" class="recent-searches">

    </section>
    <section id="stats" class="stats"></section>

<section id="favorites" class="favorites"></section>

<ul id="suggestions" class="suggestions"></ul>

    <!-- Loading -->
    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Fetching movie details...</p>
    </div>

    <!-- Error -->
    <div id="errorMessage" class="hidden">

        <div class="error-card">
            <h3>❌ Movie Not Found</h3>
            <p>Please try another title.</p>
        </div>

    </div>

    <!-- Welcome -->
    <div id="welcome">

        <h2>Welcome to Movie Search App</h2>

        <p>
            Search any movie and instantly get detailed information.
        </p>

    </div>

    <!-- Results -->
    <main id="movieContainer">

    </main>

    <!-- Footer -->
    <footer>

        <p>Powered by OMDb API</p>

        <p>Developed by Nandith M Y</p>

    </footer>

    <script src="js/script.js"></script>

</body>
</html>
